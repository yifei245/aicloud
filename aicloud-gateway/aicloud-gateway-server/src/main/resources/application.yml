        - id: aicloud-promotion
          uri: http://${AICLOUD_PROMOTION_HOST:127.0.0.1}:49016
          predicates:
            - Path=/promotion/**
        - id: aicloud-merchant
          uri: http://${AICLOUD_MERCHANT_HOST:127.0.0.1}:49018
          predicates:
            - Path=/merchant/**
        - id: aicloud-crm
          uri: http://${AICLOUD_CRM_HOST:127.0.0.1}:49019
          predicates:
            - Path=/crm/**
        - id: aicloud-erp
          uri: http://${AICLOUD_ERP_HOST:127.0.0.1}:49020
          predicates:
            - Path=/erp/**
        - id: aicloud-bpm
          uri: http://${AICLOUD_BPM_HOST:127.0.0.1}:49021
          predicates:
            - Path=/bpm/**
        - id: aicloud-report
          uri: http://${AICLOUD_REPORT_HOST:127.0.0.1}:49022
          predicates:
            - Path=/report/**
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        refresh-enabled: true
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
