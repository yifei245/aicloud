knife4j:
  enable: true
  setting:
    language: zh_cn
  gateway:
    enabled: true
    strategy: manual
    tags-sorter: order
    operations-sorter: order
    routes:
      - name: 网关服务
        url: /v3/api-docs
        service-name: aicloud-gateway
        context-path: /
        order: 1
      - name: 认证中心
        url: /v3/api-docs/auth
        service-name: aicloud-auth
