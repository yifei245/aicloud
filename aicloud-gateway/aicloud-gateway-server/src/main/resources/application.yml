spring:
  config:
    import:
      - optional:nacos:${spring.application.name}.yaml
  application:
    name: aicloud-gateway
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/aicloud?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    gateway:
      routes:
        - id: docs-auth
          uri: http://${AICLOUD_AUTH_HOST:127.0.0.1}:48081
          predicates:
            - Path=/v3/api-docs/auth
          filters:
            - PreserveHostHeader
            - SetPath=/v3/api-docs
        - id: docs-system
          uri: http://${AICLOUD_SYSTEM_HOST:127.0.0.1}:49010
          predicates:
            - Path=/v3/api-docs/system
          filters:
            - PreserveHostHeader
            - SetPath=/v3/api-docs
        - id: docs-member
          uri: http://${AICLOUD_MEMBER_HOST:127.0.0.1}:49012
          predicates:
            - Path=/v3/api-docs/member
          filters:
            - PreserveHostHeader
            - SetPath=/v3/api-docs
        - id: docs-mp
          uri: http://${AICLOUD_MP_HOST:127.0.0.1}:49013
          predicates:
            - Path=/v3/api-docs/mp
          filters:
            - PreserveHostHeader
            - SetPath=/v3/api-docs
        - id: docs-openapi
          uri: http://${AICLOUD_OPENAPI_HOST:127.0.0.1}:49023
          predicates:
            - Path=/v3/api-docs/openapi
          filters:
            - PreserveHostHeader
            - SetPath=/v3/api-docs
        - id: docs-infra
          uri: http://${AICLOUD_INFRA_HOST:127.0.0.1}:49011
          predicates:
            - Path=/v3/api-docs/infra
          filters:
            - PreserveHostHeader
            - SetPath=/v3/api-docs
        - id: docs-product
          uri: http://${AICLOUD_PRODUCT_HOST:127.0.0.1}:49017
          predicates:
            - Path=/v3/api-docs/product
          filters:
            - PreserveHostHeader
            - SetPath=/v3/api-docs
        - id: docs-trade
          uri: http://${AICLOUD_TRADE_HOST:127.0.0.1}:49014
          predicates:
            - Path=/v3/api-docs/trade
          filters:
            - PreserveHostHeader
            - SetPath=/v3/api-docs
        - id: docs-pay
          uri: http://${AICLOUD_PAY_HOST:127.0.0.1}:49015
          predicates:
            - Path=/v3/api-docs/pay
          filters:
            - PreserveHostHeader
            - SetPath=/v3/api-docs
        - id: docs-promotion
          uri: http://${AICLOUD_PROMOTION_HOST:127.0.0.1}:49016
          predicates:
            - Path=/v3/api-docs/promotion
          filters:
            - PreserveHostHeader
            - SetPath=/v3/api-docs
        - id: docs-merchant
          uri: http://${AICLOUD_MERCHANT_HOST:127.0.0.1}:49018
          predicates:
            - Path=/v3/api-docs/merchant
          filters:
            - PreserveHostHeader
            - SetPath=/v3/api-docs
        - id: docs-crm
          uri: http://${AICLOUD_CRM_HOST:127.0.0.1}:49019
          predicates:
            - Path=/v3/api-docs/crm
          filters:
            - PreserveHostHeader
            - SetPath=/v3/api-docs
        - id: docs-erp
          uri: http://${AICLOUD_ERP_HOST:127.0.0.1}:49020
          predicates:
            - Path=/v3/api-docs/erp
          filters:
            - PreserveHostHeader
            - SetPath=/v3/api-docs
        - id: docs-bpm
