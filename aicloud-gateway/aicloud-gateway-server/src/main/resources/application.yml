        - id: aicloud-product
          uri: http://${AICLOUD_PRODUCT_HOST:127.0.0.1}:49017
          predicates:
            - Path=/product/**
        - id: aicloud-trade
          uri: http://${AICLOUD_TRADE_HOST:127.0.0.1}:49014
          predicates:
            - Path=/trade/**
        - id: aicloud-pay
          uri: http://${AICLOUD_PAY_HOST:127.0.0.1}:49015
          predicates:
