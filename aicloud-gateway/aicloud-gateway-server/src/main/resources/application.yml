mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
aicloud:
  gateway:
    openapi:
      enabled: true
      max-time-drift-seconds: 300
      max-future-seconds: 30
      replay-protect-enabled: true
      nonce-ttl-seconds: 300
      min-nonce-window-seconds: 60
      rate-limit-enabled: true
      requests-per-minute: 120
      redis-guard-enabled: true
    audit:
      archive:
        enabled: true
        retention-days: 30
        batch-size: 1000
        cron: "0 15 3 * * ?"
      export:
        cleanup:
          enabled: true
          retention-days: 7
          batch-size: 500
          cron: "0 40 3 * * ?"
    permission-rules:
      # 高优先级 deny 规则：禁止 MEMBER 访问全部 system 管理端路径
      - name: deny-member-system
        path: /system/**
        effect: DENY
        priority: 100
        user-types: [MEMBER]
        enabled: true
      # 高优先级 deny 规则：禁止 MEMBER 访问网关管理路径
      - name: deny-member-gateway-admin
        path: /gateway/**
        effect: DENY
        priority: 100
        user-types: [MEMBER]
        enabled: true
      - name: allow-admin-audit-stats
        method: GET
        path: /gateway/audit/stats
        permission: system:role:assign
        effect: ALLOW
        priority: 20
        terminals: [ADMIN]
        user-types: [ADMIN]
        enabled: true
      - name: allow-admin-audit-logs
        method: GET
        path: /gateway/audit/logs
        permission: system:role:assign
        effect: ALLOW
        priority: 20
        terminals: [ADMIN]
        user-types: [ADMIN]
        enabled: true
      - name: allow-admin-audit-logs-export
        method: GET
        path: /gateway/audit/logs/export
        permission: system:role:assign
        effect: ALLOW
        priority: 20
        terminals: [ADMIN]
        user-types: [ADMIN]
        enabled: true
      - name: allow-admin-audit-export-create
        method: POST
        path: /gateway/audit/export/tasks
        permission: system:role:assign
        effect: ALLOW
        priority: 20
        terminals: [ADMIN]
        user-types: [ADMIN]
        enabled: true
      - name: allow-admin-audit-export-query
        method: GET
        path: /gateway/audit/export/tasks/**
        permission: system:role:assign
        effect: ALLOW
        priority: 20
        terminals: [ADMIN]
        user-types: [ADMIN]
        enabled: true
      - name: allow-admin-audit-export-list
        method: GET
        path: /gateway/audit/export/tasks/list
        permission: system:role:assign
        effect: ALLOW
        priority: 21
        terminals: [ADMIN]
        user-types: [ADMIN]
        enabled: true
      - name: allow-admin-audit-export-cleanup-run
        method: POST
        path: /gateway/audit/export/tasks/cleanup/run
        permission: system:role:assign
        effect: ALLOW
        priority: 20
        terminals: [ADMIN]
        user-types: [ADMIN]
        enabled: true
      - name: allow-admin-audit-archive-run
        method: POST
        path: /gateway/audit/archive/run
        permission: system:role:assign
        effect: ALLOW
        priority: 20
        terminals: [ADMIN]
        user-types: [ADMIN]
        enabled: true
      - name: allow-member-web-profile
        method: GET
        path: /web/member/profile
        effect: ALLOW
        priority: 8
        terminals: [WEB]
        user-types: [MEMBER]
        enabled: true
      - name: allow-member-app-profile
