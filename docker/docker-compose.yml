version: '3.9'
x-app-env: &app_env
  SPRING_CLOUD_NACOS_SERVER_ADDR: host.docker.internal:8848
  SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: host.docker.internal:8848
  SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: host.docker.internal:8848
  SPRING_CLOUD_NACOS_DISCOVERY_FAIL_FAST: "false"
  SPRING_CLOUD_NACOS_CONFIG_FAIL_FAST: "false"
  SPRING_CLOUD_NACOS_USERNAME: nacos
  SPRING_CLOUD_NACOS_PASSWORD: nacos
  SPRING_CLOUD_NACOS_DISCOVERY_USERNAME: nacos
  SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: nacos
  SPRING_CLOUD_NACOS_CONFIG_USERNAME: nacos
  SPRING_CLOUD_NACOS_CONFIG_PASSWORD: nacos
  SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/aicloud?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_0900_ai_ci&serverTimezone=Asia/Shanghai
  SPRING_DATASOURCE_USERNAME: root
  SPRING_DATASOURCE_PASSWORD: Aa123456
  SPRING_DATA_REDIS_HOST: host.docker.internal
  SPRING_DATA_REDIS_PORT: 6379
  SPRING_DATA_REDIS_PASSWORD: Aa123456
services:
  gateway:
    build:
      context: ..
      dockerfile: docker/gateway/Dockerfile
    container_name: aicloud-gateway
    environment:
      <<: *app_env
      AICLOUD_AUTH_HOST: auth
      AICLOUD_SYSTEM_HOST: system
      AICLOUD_MEMBER_HOST: member
      AICLOUD_MP_HOST: mp
      AICLOUD_OPENAPI_HOST: openapi
      AICLOUD_INFRA_HOST: infra
      AICLOUD_PRODUCT_HOST: product
      AICLOUD_TRADE_HOST: trade
      AICLOUD_PAY_HOST: pay
      AICLOUD_PROMOTION_HOST: promotion
      AICLOUD_MERCHANT_HOST: merchant
      AICLOUD_CRM_HOST: crm
      AICLOUD_ERP_HOST: erp
      AICLOUD_BPM_HOST: bpm
      AICLOUD_REPORT_HOST: report
      AICLOUD_GATEWAY_AUTH_SERVICE_URL: http://auth:48081
    ports:
      - "48080:48080"

  auth:
    build:
      context: ..
      dockerfile: docker/auth/Dockerfile
    container_name: aicloud-auth
    environment:
      <<: *app_env
    ports:
      - "48081:48081"

  system:
    build:
      context: ..
      dockerfile: docker/modules/Dockerfile
      args:
        JAR_FILE: aicloud-module-system/aicloud-module-system-biz/target/aicloud-module-system-biz-1.0.0-SNAPSHOT.jar
    container_name: aicloud-system
    environment:
      <<: *app_env
    ports:
      - "49010:49010"

  member:
    build:
      context: ..
      dockerfile: docker/modules/Dockerfile
      args:
        JAR_FILE: aicloud-module-member/aicloud-module-member-biz/target/aicloud-module-member-biz-1.0.0-SNAPSHOT.jar
    container_name: aicloud-member
    environment:
      <<: *app_env
    ports:
      - "49012:49012"

  mp:
    build:
      context: ..
      dockerfile: docker/modules/Dockerfile
      args:
        JAR_FILE: aicloud-module-mp/aicloud-module-mp-biz/target/aicloud-module-mp-biz-1.0.0-SNAPSHOT.jar
    container_name: aicloud-mp
    environment:
