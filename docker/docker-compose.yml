version: '3.9'
x-app-env: &app_env
  SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
  SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
  SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
  SPRING_CLOUD_NACOS_DISCOVERY_FAIL_FAST: "false"
  SPRING_CLOUD_NACOS_CONFIG_FAIL_FAST: "false"
  SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/aicloud?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
  SPRING_DATASOURCE_USERNAME: root
  SPRING_DATASOURCE_PASSWORD: root
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PORT: 6379
services:
  mysql:
    image: mysql:8.4
    container_name: aicloud-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aicloud
      TZ: Asia/Shanghai
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
    ports:
      - "13306:3306"
    volumes:
      - ./mysql/data9:/var/lib/mysql
      - ../sql:/docker-entrypoint-initdb.d

  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: aicloud-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 256m
    ports:
      - "18848:8848"
      - "19848:9848"

  redis:
    image: redis:7.2-alpine
    container_name: aicloud-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "16379:6379"
    volumes:
      - ./redis/data:/data

  gateway:
    build:
      context: ..
      dockerfile: docker/gateway/Dockerfile
    container_name: aicloud-gateway
    environment:
      <<: *app_env
      AICLOUD_AUTH_HOST: auth
      AICLOUD_SYSTEM_HOST: system
      AICLOUD_MEMBER_HOST: member
      AICLOUD_MP_HOST: mp
      AICLOUD_OPENAPI_HOST: openapi
      AICLOUD_INFRA_HOST: infra
      AICLOUD_PRODUCT_HOST: product
      AICLOUD_TRADE_HOST: trade
      AICLOUD_PAY_HOST: pay
      AICLOUD_PROMOTION_HOST: promotion
      AICLOUD_MERCHANT_HOST: merchant
      AICLOUD_CRM_HOST: crm
      AICLOUD_ERP_HOST: erp
      AICLOUD_BPM_HOST: bpm
      AICLOUD_REPORT_HOST: report
      AICLOUD_GATEWAY_AUTH_SERVICE_URL: http://auth:48081
    ports:
      - "48080:48080"
    depends_on:
      - nacos
      - redis

  auth:
    build:
      context: ..
      dockerfile: docker/auth/Dockerfile
    container_name: aicloud-auth
    environment:
      <<: *app_env
    ports:
      - "48081:48081"
    depends_on:
      - nacos
      - mysql

  system:
    build:
      context: ..
      dockerfile: docker/modules/Dockerfile
      args:
        JAR_FILE: aicloud-module-system/aicloud-module-system-biz/target/aicloud-module-system-biz-1.0.0-SNAPSHOT.jar
    container_name: aicloud-system
    environment:
      <<: *app_env
    ports:
      - "49010:49010"
    depends_on:
      - nacos
      - mysql

  member:
    build:
      context: ..
      dockerfile: docker/modules/Dockerfile
      args:
        JAR_FILE: aicloud-module-member/aicloud-module-member-biz/target/aicloud-module-member-biz-1.0.0-SNAPSHOT.jar
    container_name: aicloud-member
    environment:
      <<: *app_env
    ports:
      - "49012:49012"
    depends_on:
      - nacos

  mp:
    build:
      context: ..
      dockerfile: docker/modules/Dockerfile
      args:
        JAR_FILE: aicloud-module-mp/aicloud-module-mp-biz/target/aicloud-module-mp-biz-1.0.0-SNAPSHOT.jar
    container_name: aicloud-mp
    environment:
